<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i-Cleaner | Staff Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="employee-body">
    <nav>
        <div class="nav-content">
            <h2>✨ i-Cleaner Staff</h2>
            <div class="user-info">
                <button id="themeToggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
                <span id="staff-name">Loading...</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-content">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Operations Console</h1>
                <button id="addOrderBtn" class="login-btn" style="width: auto; padding: 0.8rem 1.5rem; margin: 0;">+ New Manual Order</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Active Orders</h3>
                    <p id="total-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Waiting for Wash</h3>
                    <p id="pending-orders">0</p>
                </div>
            </div>
        </header>

        <div class="live-grid">
            <section class="machine-monitoring">
                <h2>Machine Status</h2>
                <div class="machine-grid">
                    <!-- Machines injected by JS -->
                </div>
            </section>

            <section class="activity-section">
                <h2>Live Activity Feed</h2>
                <div class="activity-feed" id="activity-log">
                    <!-- Activity items -->
                </div>
            </section>
        </div>

        <section class="orders-section">
            <h2>Work Queue</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Orders will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal for Manual Order -->
    <div id="orderModal" class="modal" style="display: none;">
        <div class="modal-content stat-card">
            <h2>Add New Manual Order</h2>
            <form id="manualOrderForm">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>Phone Number (for WhatsApp)</label>
                    <input type="text" id="custPhone" placeholder="07xxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label>Service Type</label>
                    <select id="serviceType" class="action-select" style="width: 100%; padding: 0.8rem;">
                        <option value="Wash & Fold">Wash & Fold</option>
                        <option value="Dry Cleaning">Dry Cleaning</option>
                        <option value="Ironing">Ironing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Garment Count</label>
                    <input type="number" id="gCount" required>
                </div>
                <div class="form-group">
                    <label>Total Price (TSH)</label>
                    <input type="number" id="tPrice" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="login-btn">Create Order</button>
                    <button type="button" onclick="document.getElementById('orderModal').style.display='none'" class="login-btn btn-danger">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for QR Code -->
    <div id="qrModal" class="modal" style="display: none;">
        <div class="modal-content stat-card" style="text-align: center;">
            <h2>Order QR Code</h2>
            <p id="qrOrderInfo" style="margin-bottom: 1rem; color: var(--text-muted);"></p>
            <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 1.5rem; background: white; padding: 1rem; border-radius: 1rem;"></div>
            <button type="button" onclick="document.getElementById('qrModal').style.display='none'" class="login-btn">Close</button>
        </div>
    </div>

    <script type="module" src="employee.js"></script>
</body>
</html>
