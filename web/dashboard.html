<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i-Laundry | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-content">
            <h2>🧺 i-Laundry Admin</h2>
            <div class="user-info">
                <span id="admin-name">Loading...</span>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-content">
        <header>
            <h1>Order Management</h1>
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Orders</h3>
                    <p id="total-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <p id="pending-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Revenue</h3>
                    <p id="today-revenue">KSH 0.00</p>
                </div>
            </div>
        </header>

        <section class="orders-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <!-- Orders will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
