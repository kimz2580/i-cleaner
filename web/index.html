<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i-Cleaner | Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <!-- Animated Bubbles Background -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">🧼</div>
            <h1>i-Cleaner</h1>
            <p class="subtitle">Operations Control Center</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@icleaner.com" required>
                </div>
                <div class="form-group">
                    <label>Secure Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="loginBtn" class="login-btn">Authenticate Access</button>
            </form>

            <div class="app-download-section">
                <p>Are you a customer?</p>
                <a href="#" class="download-badge">
                    <span>Get it on</span>
                    <strong>Android Device</strong>
                </a>
            </div>

            <p id="error-message"></p>
            <div style="margin-top: 1.5rem; font-size: 0.8rem;">
                <a href="privacy.html" style="color: var(--text-muted); text-decoration: none; opacity: 0.7;">Privacy Policy</a>
            </div>
        </div>
    </div>

    <div class="system-status-pill">
        <span class="status-dot"></span> System Live: i-Cleaner Cloud v2.4
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
